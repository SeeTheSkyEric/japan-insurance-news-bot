name: 일본 보험뉴스 자동 발송
on:
  schedule:
    - cron: "0 23 * * 0-4"
  workflow_dispatch:
jobs:
  send-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install anthropic requests beautifulsoup4

      # ❌ 캐시 steps 삭제 — docs/sent_news_history.json을 git에서 직접 관리

      - name: 뉴스봇 실행 (HTML 생성 + 슬랙 발송)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NEWSAPI_KEY:       ${{ secrets.NEWSAPI_KEY }}
          GITHUB_PAGES_URL:  https://seetheskyeric.github.io/japan-insurance-news-bot
        run: python news_bot.py

      - name: GitHub Pages HTML + 이력 파일 배포 (Push)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/sent_news_history.json   # ← 이력 파일도 함께 커밋
          git diff --cached --quiet || git commit -m "뉴스 페이지 업데이트 $(date +'%Y-%m-%d')"
          git push
