# .github/workflows/news_bot.yml
# 매일 오전 8시(KST = UTC+9) → UTC 기준 23:00에 실행
name: 일본 보험뉴스 자동 발송
on:
  schedule:
    - cron: "0 23 * * 1-5"   # 월~금 UTC 23:00 = KST 08:00
  workflow_dispatch:           # 수동 실행 버튼
jobs:
  send-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 패키지 설치
        run: pip install anthropic requests beautifulsoup4
      - name: 발송 이력 복원
        uses: actions/cache@v4
        with:
          path: sent_news_history.json
          key: sent-news-history-${{ github.run_id }}
          restore-keys: sent-news-history-

      - name: 뉴스봇 실행 (HTML 생성 + 슬랙 발송)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_PAGES_URL:  https://seetheskyeric.github.io/japan-insurance-news-bot
        run: python news_bot.py

      - name: GitHub Pages HTML 배포 (Push)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "뉴스 페이지 업데이트 $(date +'%Y-%m-%d')"
          git push

      - name: Post 발송 이력 복원
        uses: actions/cache@v4
        with:
          path: sent_news_history.json
          key: sent-news-history-${{ github.run_id }}
          restore-keys: sent-news-history-
