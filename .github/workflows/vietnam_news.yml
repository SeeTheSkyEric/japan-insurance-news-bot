name: Vietnam Insurance News Bot

on:
  schedule:
    # 매 영업일 오전 8시 KST = UTC 23:00 (전날)
    # 월~금 (UTC 기준 일~목)
    - cron: '0 23 * * 0-4'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  send-vietnam-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests feedparser google-generativeai beautifulsoup4

      - name: Run Vietnam News Bot
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SLACK_WEBHOOK_VIETNAM: ${{ secrets.SLACK_WEBHOOK_VIETNAM }}
        run: |
          python vietnam/vietnam_news.py

      - name: Commit updated history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/vietnam_sent_history.json
          git diff --staged --quiet || git commit -m "Update Vietnam news history [$(date '+%Y-%m-%d')]"
          git push
