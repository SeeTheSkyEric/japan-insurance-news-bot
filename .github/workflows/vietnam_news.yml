name: Vietnam Insurance News Bot

on:
  schedule:
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

jobs:
  send-vietnam-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests feedparser google-genai beautifulsoup4

      - name: Run Vietnam News Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SLACK_WEBHOOK_VIETNAM: ${{ secrets.SLACK_WEBHOOK_VIETNAM }}
          GITHUB_PAGES_URL: https://seetheskyeric.github.io/japan-insurance-news-bot/vietnam.html
        run: |
          python vietnam/vietnam_news.py

      - name: Commit updated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/vietnam.html docs/vietnam_sent_history.json || true
          git diff --staged --quiet || git commit -m "Update Vietnam news [$(date '+%Y-%m-%d')]"
          git push || true
